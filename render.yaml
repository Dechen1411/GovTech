services:
  - type: web
    runtime: node
    name: govtech-smart-property-api
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: bun install
    startCommand: bun src/server.mjs
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BUN_VERSION
        value: 1.3.14
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: smart_property_platform
      - key: MONGODB_TLS_ALLOW_INVALID_HOSTNAMES
        value: "true"
      - key: DOCUMENT_ENCRYPTION_KEY
        sync: false
      - key: DOCUMENT_STORAGE_DRIVER
        value: ipfs
      - key: PINATA_JWT
        sync: false
      - key: PINATA_FILE_API_URL
        value: https://api.pinata.cloud/pinning/pinFileToIPFS
      - key: PINATA_NETWORK
        value: public
      - key: PINATA_GATEWAY_URL
        sync: false
      - key: CHAIN_RPC_URL
        sync: false
      - key: SMART_CONTRACT_ADDRESS
        value: 0xAc10699Cc1198516c79f7670b86F4A235127f86c
      - key: PRIVATE_KEY
        sync: false
      - key: ADMIN_DEMO_MODE
        value: "false"
      - key: ADMIN_HOLDER_DIDS
        sync: false
      - key: ADMIN_ID_NUMBER_HASHES
        sync: false
      - key: ADMIN_WALLET_ADDRESSES
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: PRIVY_API_BASE
        value: https://api.privy.io/v1
      - key: NDI_AUTH_BASE
        value: https://staging.bhutanndi.com
      - key: NDI_API_BASE
        value: https://demo-client.bhutanndi.com
      - key: NDI_CLIENT_ID
        sync: false
      - key: NDI_CLIENT_SECRET
        sync: false
      - key: NDI_FOUNDATIONAL_SCHEMA
        value: https://dev-schema.ngotag.com/schemas/c7952a0a-e9b5-4a4b-a714-1e5d0a1ae076
      - key: NDI_NATS_URL
        value: wss://natsdemoclient.bhutanndi.com
      - key: NDI_NATS_NKEY_SEED
        sync: false

  - type: web
    runtime: static
    name: govtech-smart-property-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://govtech-smart-property-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
